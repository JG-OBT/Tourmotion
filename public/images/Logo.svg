  <!-- Main Orange Circle -->
  <circle cx="250" cy="250" r="220" fill="#f69435"/>
  
  <!-- "TOUR" Text -->
  <text x="50%" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="120" fill="#4c7c4c" letter-spacing="-5">TOUR</text>
  
  <!-- "MOTION" Text -->
  <text x="50%" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="110" fill="#0ea5e9" letter-spacing="-2">MOTION</text>
  
  <!-- Campervan Silhouette -->
  <path d="M180 380 L180 410 Q180 420 190 420 L310 420 Q320 420 320 410 L320 380 L180 380 Z" fill="#374151"/>
  <path d="M190 380 L230 350 L300 350 L310 380 Z" fill="#374151"/>
  
  <!-- Wavy Lines -->
  <path d="M120 430 Q250 410 380 430" stroke="#0ea5e9" stroke-width="8" fill="none"/>
  <path d="M120 445 Q250 425 380 445" stroke="#facc15" stroke-width="8" fill="none"/>
  <path d="M120 460 Q250 440 380 460" stroke="#4c7c4c" stroke-width="8" fill="none"/>
  
